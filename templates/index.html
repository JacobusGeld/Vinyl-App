<!DOCTYPE html>
<html>
<head>
    <title>Vinyl App</title>
</head>
<body>
    <h1>Search Vinyl</h1>

    <form method="POST">
        <input type="text" name="search" placeholder="Enter artist or album">
        <button type="submit">Search</button>
    </form>

    {% if result %}
        <p>{{ result }}</p>
    {% endif %}
</body>
</html>
